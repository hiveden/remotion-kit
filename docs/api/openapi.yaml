openapi: 3.1.0
info:
  title: remotion-kit API
  version: 0.0.0
  description: |
    HTTP API for `@hiveden/remotion-kit` Next.js app.
    Schema-first single source of truth. Frontend consumes via openapi-typescript codegen.

    Status: skeleton. Filled in during T2 (clip module migration) + T4 (LLM integration).

servers:
  - url: http://127.0.0.1:3200
    description: local dev (bun run dev)

tags:
  - name: clips
    description: Clip CRUD + brief management
  - name: generate
    description: LLM-driven Composition.tsx generation

paths:
  /api/clips:
    get:
      tags: [clips]
      summary: List clips
      parameters:
        - name: include
          in: query
          schema: { type: string, enum: [archived, all] }
          description: Include archived clips
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  clips:
                    type: array
                    items: { $ref: '#/components/schemas/ClipBrief' }
                required: [clips]
    post:
      tags: [clips]
      summary: Create clip (idempotent ensure if id provided)
      description: |
        If `id` is provided, the endpoint behaves as an idempotent ensure:
        - existing clip with that id → 200 { clip } (does not touch disk)
        - new clip → 201 { clip } created with the provided id

        If `id` is omitted, a fresh id is generated from `name` and a new clip
        is always created (201). This branch can still 409 on rare slug
        collisions (random uuid suffix).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, description: 'Display name. Empty → "Untitled clip".' }
                id:
                  type: string
                  description: |
                    Optional. When supplied, must match the clip-id regex.
                    Used by the v0.2 demo to pin `demo-session` so reloads do
                    not accumulate session clips on disk.
                  pattern: '^[a-z0-9][a-z0-9-]{0,71}$'
      responses:
        '200':
          description: Existing clip returned (idempotent ensure, id-branch only)
          content:
            application/json:
              schema:
                type: object
                properties:
                  clip: { $ref: '#/components/schemas/ClipBrief' }
                required: [clip]
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  clip: { $ref: '#/components/schemas/ClipBrief' }
                required: [clip]
        '400':
          description: Invalid clip id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: ID conflict (only possible in the auto-generated-id branch)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/clips/{id}:
    parameters:
      - $ref: '#/components/parameters/ClipId'
    get:
      tags: [clips]
      summary: Get clip brief
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  clip: { $ref: '#/components/schemas/ClipBrief' }
                required: [clip]
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      tags: [clips]
      summary: Replace clip brief
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClipBrief' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  clip: { $ref: '#/components/schemas/ClipBrief' }
                required: [clip]
        '422':
          description: Validation failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/clips/{id}/generate:
    parameters:
      - $ref: '#/components/parameters/ClipId'
    post:
      tags: [generate]
      summary: Generate Composition.tsx via LLM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenePrompt, durationSeconds]
              properties:
                scenePrompt: { type: string, minLength: 1 }
                durationSeconds: { type: number, exclusiveMinimum: 0 }
                cameraHint: { type: string }
      responses:
        '200':
          description: Generated
          content:
            application/json:
              schema:
                type: object
                required: [ok, clipId, generatedAt, codeLength]
                properties:
                  ok: { type: boolean, enum: [true] }
                  clipId: { type: string }
                  generatedAt: { type: string, format: date-time }
                  codeLength: { type: integer }
        '422':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Generate failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/clips/{id}/exists:
    parameters:
      - $ref: '#/components/parameters/ClipId'
    get:
      tags: [clips]
      summary: Lightweight existence probe (peek)
      description: |
        Used by StorageProvider.peekComposition() (T26) to decide on mount
        whether the client should restore a previously-generated Composition.tsx
        without performing any heavy reads.

        Semantics:
        - `exists: true`  ⇔ `.meta/last-generate.json` exists AND its `errorCode === null`
          (i.e. there is a successful LLM-generated Composition)
        - `exists: false` ⇔ no record file, malformed record, or the latest take
          recorded an error code

        Side-effect free: does NOT create the clip directory, does NOT trigger
        ensureSession, does NOT read the full Composition.tsx.
      responses:
        '200':
          description: Probe result (regardless of existence)
          content:
            application/json:
              schema:
                type: object
                required: [exists]
                properties:
                  exists:
                    type: boolean
                  meta:
                    type: object
                    description: Present only when `exists: true`. Fields may be null when the persisted record lacked them.
                    properties:
                      generatedAt:
                        oneOf:
                          - { type: string, format: date-time }
                          - { type: 'null' }
                      codeLength:
                        oneOf:
                          - { type: integer }
                          - { type: 'null' }
                      provider:
                        oneOf:
                          - { type: string }
                          - { type: 'null' }
                      model:
                        oneOf:
                          - { type: string }
                          - { type: 'null' }
        '400':
          description: Invalid clip id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Filesystem read error (non-ENOENT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/llm/raw:
    post:
      tags: [generate]
      summary: Stateless LLM bridge — returns generated tsx text without writing to disk
      description: |
        Used by the ClientIndexedDBProvider (T22 Phase 3). Takes a prompt and
        returns the assistant text + extracted tsx code block. The endpoint
        does NOT touch the filesystem; the client persists the result itself
        (typically in IndexedDB). No clip / brief / take state is created.

        The optional `brief` body field is a minimal slice (aspect ratio,
        publish platform, caption style, brand ref, references) that the
        prompt builder consumes — there is no need to send a full ClipBrief.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scenePrompt, durationSeconds]
              properties:
                scenePrompt: { type: string, minLength: 1 }
                durationSeconds: { type: number, exclusiveMinimum: 0, maximum: 60 }
                cameraHint: { type: string }
                brief:
                  type: object
                  description: 'Optional minimal slice used by the prompt builder. All fields are individually optional; missing fields fall back to DEFAULT_PROMPT_BRIEF.'
                  properties:
                    aspectRatio: { type: string, enum: ['9:16', '16:9', '1:1'] }
                    publishPlatform: { type: string, enum: [youtube, douyin, bilibili, xiaohongshu, generic] }
                    captionStyle: { type: string, enum: [subtle, bold, kinetic] }
                    brandRef:
                      oneOf:
                        - { type: string }
                        - { type: 'null' }
                    references:
                      type: array
                      items: { type: string, minLength: 1 }
      responses:
        '200':
          description: Generated text + extracted code
          content:
            application/json:
              schema:
                type: object
                required: [ok, text, code, codeLength, provider, model, durationMs]
                properties:
                  ok: { type: boolean, enum: [true] }
                  text: { type: string, description: 'Raw assistant text (includes the markdown code fence).' }
                  code: { type: string, description: 'Extracted tsx body inside the fenced block.' }
                  codeLength: { type: integer }
                  provider: { type: string, enum: [openai] }
                  model: { type: string }
                  usage:
                    oneOf:
                      - { type: object, additionalProperties: true }
                      - { type: 'null' }
                  durationMs: { type: integer }
        '400':
          description: Malformed body
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: LLM authentication failure (AUTH_*)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Invalid request body or brief (VALIDATION_*)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limit / quota (QUOTA_EXCEEDED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: LLM gateway or extraction failure (SYSTEM_* / VALIDATION_EMPTY_RESPONSE / VALIDATION_NO_CODE_BLOCK)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/clips/{id}/record:
    parameters:
      - $ref: '#/components/parameters/ClipId'
    get:
      tags: [generate]
      summary: Get last generate record (LLM debug / take history)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [source]
                properties:
                  source:
                    type: string
                    enum: [persisted, best-effort, none]
                    description: |
                      `persisted` = read from `.meta/last-generate.json`.
                      `best-effort` = reconstructed from takes/.
                      `none` = no generate yet.
                  record:
                    oneOf:
                      - { $ref: '#/components/schemas/GenerateRecord' }
                      - { type: 'null' }

components:
  parameters:
    ClipId:
      name: id
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z0-9-]+$' }

  schemas:
    ClipBrief:
      type: object
      required:
        - id
        - name
        - status
        - producerKind
        - brandRef
        - aspectRatio
        - resolution
        - publishPlatform
        - captionStyle
        - targetDuration
        - references
        - note
        - createdAt
        - updatedAt
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string, enum: [draft, archived] }
        producerKind: { type: string, enum: [remotion, image-to-video] }
        brandRef:
          oneOf:
            - { type: string }
            - { type: 'null' }
        aspectRatio: { type: string, enum: ['9:16', '16:9', '1:1'] }
        resolution: { type: string, enum: [1080p, 720p, 4k] }
        publishPlatform: { type: string, enum: [youtube, douyin, bilibili, xiaohongshu, generic] }
        captionStyle: { type: string, enum: [subtle, bold, kinetic] }
        targetDuration: { type: number, exclusiveMinimum: 0 }
        references:
          type: array
          description: |
            Free-form text references for LLM style context.
            T2 simplification: was `Array<{templateId, note?, addedAt}>`, now `string[]`.
            Each item = URL or freeform style hint.
          items: { type: string, minLength: 1 }
        note: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    GenerateRecord:
      type: object
      description: Per-clip last generation metadata, persisted at `.meta/last-generate.json`.
      properties:
        schemaVersion: { type: integer, enum: [1] }
        clipId: { type: string }
        clipName: { type: string }
        scenePrompt: { type: string }
        durationSeconds: { type: number }
        cameraHint:
          oneOf:
            - { type: string }
            - { type: 'null' }
        references:
          type: array
          items: { type: string }
        brand:
          type: object
          properties:
            ref:
              oneOf:
                - { type: string }
                - { type: 'null' }
        composition:
          type: object
          properties:
            aspectRatio: { type: string }
            resolution: { type: string }
            publishPlatform: { type: string }
            captionStyle: { type: string }
        llm:
          type: object
          properties:
            provider: { type: string, enum: [openai] }
            model: { type: string }
            usage:
              oneOf:
                - { type: object, additionalProperties: true }
                - { type: 'null' }
        systemPrompt: { type: string }
        userPrompt: { type: string }
        rawResponse:
          oneOf:
            - { type: string }
            - { type: 'null' }
        codeLength: { type: integer }
        durationMs: { type: integer }
        generatedAt: { type: string, format: date-time }
        errorCode:
          oneOf:
            - { type: string }
            - { type: 'null' }

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Domain-prefixed error code. Frontend can render `${code}: ${message}`
                directly except for AUTH_* (redact message, show generic config hint).
              enum:
                # AUTH_*  (HTTP 401/403) — gateway / key / permission
                - AUTH_API_KEY_INVALID
                - AUTH_FORBIDDEN
                # QUOTA_* (HTTP 429) — rate limit, monthly quota
                - QUOTA_EXCEEDED
                # SYSTEM_* (HTTP 5xx) — infra / network / model availability
                - SYSTEM_NETWORK
                - SYSTEM_MODEL_NOT_FOUND
                - SYSTEM_READ_FAILED
                - SYSTEM_WRITE_FAILED
                - SYSTEM_FIXTURE_MISSING
                - SYSTEM_FIXTURE_INVALID
                - SYSTEM_FIXTURE_NO_MATCH
                - SYSTEM_UNKNOWN
                # VALIDATION_* (HTTP 4xx) — input / LLM output validation
                - VALIDATION_INVALID_JSON
                - VALIDATION_INVALID_CLIP_ID
                - VALIDATION_INVALID_SCENE_PROMPT
                - VALIDATION_INVALID_DURATION
                - VALIDATION_INVALID_NAME
                - VALIDATION_INVALID_BRAND_REF
                - VALIDATION_INVALID_ASPECT_RATIO
                - VALIDATION_INVALID_RESOLUTION
                - VALIDATION_INVALID_PUBLISH_PLATFORM
                - VALIDATION_INVALID_CAPTION_STYLE
                - VALIDATION_INVALID_TARGET_DURATION
                - VALIDATION_INVALID_NOTE
                - VALIDATION_INVALID_STATUS
                - VALIDATION_INVALID_VERSION
                - VALIDATION_FAILED
                - VALIDATION_BAD_REQUEST
                - VALIDATION_CONTENT_FILTERED
                - VALIDATION_MAX_TOKENS_EXCEEDED
                - VALIDATION_EMPTY_RESPONSE
                - VALIDATION_NO_CODE_BLOCK
                - VALIDATION_INVALID_IMPORT
                - VALIDATION_INVALID_SYNTAX
                # Generic
                - NOT_FOUND
                - CONFLICT_ID
            message:
              type: string
              description: 'Safe message — backend sanitizes before sending. Frontend may display directly except for AUTH_* (redact).'
            retryable:
              type: boolean
              description: 'When true, client should offer a retry action (e.g. inline "Try again" button). Defaults to false if omitted.'
            trace_id:
              type: string
              description: 'Optional. For support correlation.'
