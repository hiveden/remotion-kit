pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: bun run lint --quiet
    typecheck:
      glob: "*.{ts,tsx}"
      run: bun run typecheck
    secrets:
      glob: "*.{ts,tsx,js,json,md,yaml,yml,env*}"
      run: bun run check:secrets
    purity:
      glob: "*.{ts,tsx,md}"
      run: bun run check:purity

pre-push:
  commands:
    test:
      run: bun run test
